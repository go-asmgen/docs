site_name: go-asmgen docs
site_description: Ergonomic generation of Go-compatible Plan 9 assembly for non-amd64 architectures, delegating encoding to cmd/asm.
site_url: https://go-asmgen.github.io/docs/
repo_url: https://github.com/go-asmgen
repo_name: go-asmgen
edit_uri: ""

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.svg
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - content.code.copy
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

extra:
  version:
    provider: mike
    default: latest

nav:
  - Home: index.md
  - asmgen:
      - Overview: asmgen/index.md
      - Quick start: asmgen/quickstart.md
      - ABI0 & design notes: asmgen/design.md
      - Aggregates (structs, slices, strings): asmgen/aggregates.md
      - SIMD (SSE / NEON / VSX / …): asmgen/simd.md
      - "Second architecture: riscv64": asmgen/riscv64.md
      - "Third architecture: loong64": asmgen/loong64.md
      - "Fourth target: amd64": asmgen/amd64.md
      - "Fifth target: ppc64le": asmgen/ppc64le.md
      - "Sixth target: s390x": asmgen/s390x.md
      - Roadmap: asmgen/roadmap.md
  - Contributing: contributing.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
